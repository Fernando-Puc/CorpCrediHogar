<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
<div class="mainContainer">
  <div class="subExpand">
    <div calss="y">
      <div class="x">
        <h1 class="table__title">Lista de productos</h1>
      </div>
      <div class="xend">
        <action-button variant="accept" text="Agregar producto" (click)="navigateToAddNew()" ></action-button>
      </div>
    </div>


    <div class="tableWrap">
      <div class="table__responsive-container">
        <table class="table">
          <thead class="table__head">
            <tr class="table__row">
              <th class="table__header">Codigo</th>
              <th class="table__header">Nombre</th>
              <th class="table__header">Linea</th>
              <th class="table__header">Marca</th>
              <th class="table__header">Unidad de Medida</th>
            </tr>
          </thead>
          <tbody class="table__body">
            @for(producto of productoslist; track producto) {
            <ng-container>
              <tr class="table__row">
                <td class="table__data">{{producto.nombre}}</td>
                <td class="table__data">{{producto.linea}}</td>
                <td class="table__data">{{producto.marca}}</td>
                <td class="table__data">{{producto.unidad_de_medida}}</td>
                <td class="table__data">{{producto.clave_SAT}}</td>
                <td class="table__data">
                  <div class="table__column-actions">
                    <button [innerHTML]="actionIcons[0] | safeHtml "></button>
                    <button [innerHTML]="actionIcons[1] | safeHtml "></button>
                    <button [innerHTML]="actionIcons[2] | safeHtml "></button>
                  </div>
                </td>
              </tr>
            </ng-container>
          }
          </tbody>
        </table>
      </div>

      <footer class="table__footer-controls">
        <div class="table__pagination-buttons">
          <span class="table__pagination.view">0 productos</span>
          <button class="table__pagination-button">
            <span [innerHTML]="paginationIcons.left | safeHtml"></span>
          </button>
          <button class="table__pagination-button">
            <span [innerHTML]="paginationIcons.right | safeHtml"></span>
          </button>
        </div>
      </footer>
    </div>
  </div>
</div>
