<h2>Clientes</h2>

<form [formGroup]="formulario" (ngSubmit)="guardar()">

  <input type="text"
         placeholder="Nombres"
         formControlName="nombres">

  <input type="text"
         placeholder="Apellidos"
         formControlName="apellidos">

  <input type="text"
         placeholder="Tipo Contacto"
         formControlName="tipoContacto">

  <input type="text"
         placeholder="Teléfono"
         formControlName="telefono">

  <input type="text"
         placeholder="Dirección"
         formControlName="direccion">

  <button type="submit">
    Guardar
  </button>

</form>

<hr>

<table>

  <thead>
    <tr>
      <th>Nombres</th>
      <th>Apellidos</th>
      <th>Tipo Contacto</th>
      <th>Teléfono</th>
    </tr>
  </thead>

  <tbody>

    @for(cliente of clientes; track cliente) {

      <tr>
        <td>{{ cliente.nombres }}</td>
        <td>{{ cliente.apellidos }}</td>
        <td>{{ cliente.tipoContacto }}</td>
        <td>{{ cliente.telefono }}</td>
      </tr>
    }
  </tbody>
</table>
